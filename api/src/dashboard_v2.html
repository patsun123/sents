<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>__PAGE_HEAD_TITLE__</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg-0: oklch(17% 0.03 260);
  --bg-1: oklch(20% 0.035 260);
  --bg-2: oklch(23% 0.04 260);
  --panel-1: oklch(21% 0.035 260);
  --panel-2: oklch(25% 0.04 260);
  --border: oklch(30% 0.035 260);
  --border-strong: oklch(38% 0.04 260);
  --fg-0: oklch(97% 0.01 260);
  --fg-1: oklch(88% 0.015 260);
  --fg-2: oklch(72% 0.02 260);
  --fg-3: oklch(55% 0.02 260);
  --bull: oklch(74% 0.18 152);
  --bear: oklch(66% 0.22 22);
  --neutral: oklch(70% 0.01 260);
  --accent: oklch(72% 0.18 250);
  --accent-soft: oklch(32% 0.08 250);
  --radius: 10px;
  --radius-sm: 6px;
  --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
}
[data-theme="light"] {
  --bg-0: oklch(98% 0.005 260); --bg-1: oklch(100% 0 0); --bg-2: oklch(96% 0.008 260);
  --panel-1: oklch(100% 0 0); --panel-2: oklch(97% 0.008 260);
  --border: oklch(90% 0.01 260); --border-strong: oklch(82% 0.015 260);
  --fg-0: oklch(18% 0.02 260); --fg-1: oklch(28% 0.02 260);
  --fg-2: oklch(45% 0.02 260); --fg-3: oklch(60% 0.02 260);
  --bull: oklch(55% 0.18 152); --bear: oklch(55% 0.22 22);
}
[data-theme="hi"] {
  --bg-0: #000; --bg-1: #050505; --bg-2: #0a0a0a;
  --panel-1: #0a0a0a; --panel-2: #111;
  --border: #222; --border-strong: #333;
  --fg-0: #fff; --fg-1: #f0f0f0; --fg-2: #bbb; --fg-3: #888;
  --bull: #00ff88; --bear: #ff3344;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body { font-family: var(--font-sans); background: var(--bg-0); color: var(--fg-1); font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
.mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1, "zero" 1; }
.tiny { font-size: 11px; }
.small { font-size: 12px; }
.muted { color: var(--fg-3); }
.up { color: var(--bull); }
.dn { color: var(--bear); }
.right { text-align: right; }
.sep { color: var(--fg-3); margin: 0 6px; }
button { font-family: inherit; cursor: pointer; }

.app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; overflow: hidden; }
.topbar { display: flex; align-items: center; gap: 16px; padding: 10px 20px; background: var(--bg-1); border-bottom: 1px solid var(--border); height: 52px; }
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: -0.01em; }
.brand-mark { width: 26px; height: 26px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), var(--bull)); position: relative; }
.brand-mark::after { content: ""; position: absolute; inset: 5px; border-radius: 3px; background: var(--bg-1); clip-path: polygon(0 80%, 20% 60%, 35% 70%, 55% 40%, 75% 55%, 100% 20%, 100% 100%, 0 100%); }
.brand-name { font-size: 14px; }
.brand-name span { color: var(--fg-3); font-weight: 500; }
.nav { display: flex; gap: 4px; margin-left: 12px; }
.nav button { background: transparent; border: none; color: var(--fg-2); padding: 7px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; }
.nav button:hover, .nav button.on { color: var(--fg-0); background: var(--panel-2); }

.storefront-switch { display: flex; gap: 2px; margin-left: auto; background: var(--panel-2); border-radius: 6px; padding: 3px; }
.sf-btn { background: transparent; border: none; color: var(--fg-3); padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-decoration: none; display: inline-flex; align-items: center; }
.sf-btn:hover { color: var(--fg-1); }
.sf-btn.on { background: var(--bg-1); color: var(--fg-0); }

.clock { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); display: flex; align-items: center; gap: 8px; }
.clock .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bull); box-shadow: 0 0 0 0 color-mix(in oklch, var(--bull), transparent 40%); animation: pulse 2s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--bull), transparent 40%); } 70% { box-shadow: 0 0 0 8px color-mix(in oklch, var(--bull), transparent 100%); } 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--bull), transparent 100%); } }

.ticker-tape { height: 36px; overflow: hidden; background: var(--bg-2); border-bottom: 1px solid var(--border); position: relative; }
.ticker-track { display: flex; gap: 24px; white-space: nowrap; padding: 8px 16px; animation: scroll 80s linear infinite; width: max-content; }
@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.tape-item { background: transparent; border: none; color: inherit; display: inline-flex; align-items: center; gap: 8px; font-size: 12px; padding: 0; }
.tape-kw { font-weight: 700; color: var(--fg-1); letter-spacing: 0.01em; }
.tape-active .tape-kw { color: var(--accent); }
.tape-price { font-family: var(--font-mono); color: var(--fg-2); }
.tape-chg { font-family: var(--font-mono); font-size: 11px; }
.tape-empty { color: var(--fg-3); font-family: var(--font-mono); font-size: 11px; padding: 8px 16px; }

.main { overflow-y: auto; padding: 20px 24px 80px; background: var(--bg-0); }
.density-dense .main { padding: 14px 18px 60px; }
.density-spacious .main { padding: 28px 36px 100px; }

.overview, .detail, .feed { display: flex; flex-direction: column; gap: 16px; max-width: 1400px; margin: 0 auto; }

.kpi-row { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr; gap: 12px; }
.kpi { background: var(--panel-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
.kpi-big { border-color: var(--accent-soft); background: linear-gradient(135deg, var(--panel-1), color-mix(in oklch, var(--accent), var(--panel-1) 88%)); }
.kpi-label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
.kpi-value { font-size: 24px; font-weight: 700; font-family: var(--font-mono); color: var(--fg-0); letter-spacing: -0.01em; }
.kpi-big .kpi-value { font-size: 30px; }
.kpi-sub { font-size: 12px; color: var(--fg-3); font-family: var(--font-mono); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card { background: var(--panel-1); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.card-title { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; color: var(--fg-1); }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-bull { background: var(--bull); }
.dot-bear { background: var(--bear); }
.dot-accent { background: var(--accent); }
.card-body { padding: 12px 16px; }
.card-tight .card-body { padding: 0; }
.density-dense .card-head, .density-dense .card-body { padding: 10px 14px; }
.density-spacious .card-head, .density-spacious .card-body { padding: 16px 20px; }

.movers { display: flex; flex-direction: column; gap: 2px; }
.mover { display: grid; grid-template-columns: 1fr 140px 90px; align-items: center; gap: 14px; background: transparent; border: none; color: inherit; padding: 10px 8px; border-radius: 6px; text-align: left; transition: background 0.12s; }
.mover:hover { background: var(--panel-2); }
.mover-left .sym { font-weight: 700; font-size: 13px; color: var(--fg-0); letter-spacing: 0.02em; }
.mover-left .sub-name { font-size: 11px; color: var(--fg-3); }
.mover-right { text-align: right; font-size: 13px; }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; font-weight: 500; font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--panel-2); position: sticky; top: 0; }
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr { cursor: pointer; transition: background 0.1s; }
.data-table tbody tr:hover { background: var(--panel-2); }
.data-table .sym { font-weight: 700; color: var(--fg-0); margin-right: 8px; letter-spacing: 0.02em; }
.data-table .sub-name { color: var(--fg-3); font-size: 12px; }

.chip { display: inline-block; padding: 2px 8px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; color: var(--fg-2); background: var(--panel-2); }
.chip.tiny { padding: 1px 6px; font-size: 10px; }
.sparkline { display: block; }

.sector-map { display: flex; flex-direction: column; gap: 10px; }
.sector-name { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; padding: 0 2px; }
.sector-tiles { display: flex; gap: 3px; flex-wrap: wrap; }
.heat-tile { border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; gap: 2px; color: var(--fg-0); flex: 1 1 80px; min-height: 56px; text-align: left; background: transparent; }
.heat-tile:hover { border-color: var(--border-strong); }
.heat-sym { font-weight: 700; font-size: 12px; letter-spacing: 0.02em; }
.heat-chg { font-size: 11px; }

.detail-head { display: flex; align-items: center; gap: 18px; padding-bottom: 4px; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--fg-2); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.btn-ghost:hover { color: var(--fg-0); border-color: var(--border-strong); }
.btn-solid { background: var(--accent); border: 1px solid var(--accent); color: var(--bg-0); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.btn-solid:hover { filter: brightness(1.1); }
.detail-title { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.detail-sym-wrap { display: flex; align-items: baseline; gap: 12px; }
.detail-sym { font-weight: 800; font-size: 24px; color: var(--fg-0); letter-spacing: -0.01em; }
.detail-name { font-size: 14px; color: var(--fg-2); }
.detail-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.detail-kw-label { font-size: 13px; color: var(--fg-3); font-family: var(--font-mono); margin-right: 4px; }

.detail-pricebar { display: flex; align-items: flex-end; gap: 32px; background: var(--panel-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
.price-main { display: flex; align-items: baseline; gap: 12px; }
.price-num { font-size: 36px; font-weight: 700; color: var(--fg-0); letter-spacing: -0.02em; }
.price-chg { font-size: 14px; font-weight: 600; }
.price-stats { display: flex; gap: 28px; margin-left: 20px; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
.stat-value { font-size: 14px; color: var(--fg-1); font-weight: 600; }

.range-picker { margin-left: auto; display: flex; gap: 2px; background: var(--panel-2); border-radius: 6px; padding: 3px; }
.range { background: transparent; border: none; color: var(--fg-3); padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
.range:hover { color: var(--fg-1); }
.range.on { background: var(--bg-1); color: var(--fg-0); }

.chart-card { background: var(--panel-1); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.chart-card-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.cch-left { display: flex; flex-direction: column; gap: 4px; }
.cch-label { font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
.cch-value { font-size: 26px; font-weight: 700; color: var(--fg-0); letter-spacing: -0.02em; display: flex; align-items: baseline; gap: 12px; }
.cch-chg { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-family: var(--font-sans); }

.chart-wrap { padding: 8px 12px 0; }
.chart-svg { width: 100%; height: 320px; display: block; cursor: crosshair; }
.grid-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0.5; }
.grid-label { fill: var(--fg-3); font-size: 10px; font-family: var(--font-mono); }
.neutral-line { stroke: var(--fg-3); stroke-width: 1; stroke-dasharray: 4 4; opacity: 0.35; }
.hover-line { stroke: var(--fg-2); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0.6; }

.chart-hover-panel { display: grid; grid-template-columns: 1fr 1fr 2.2fr; gap: 0; border-top: 1px solid var(--border); padding: 0; }
.hover-col { padding: 14px 18px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
.hover-col:last-child { border-right: none; }
.hover-label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
.hover-value { font-size: 22px; font-weight: 700; color: var(--fg-0); }
.hover-sub { font-size: 12px; }
.sent-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.sent-dot.up { background: var(--bull); }
.sent-dot.dn { background: var(--bear); }

.breakdown { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: grid; grid-template-columns: 70px 1fr 40px; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; color: var(--fg-2); }
.bar-track { height: 10px; background: var(--panel-2); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.3s ease; }
.bar-fill.up { background: var(--bull); }
.bar-fill.dn { background: var(--bear); }
.bar-fill.neu { background: var(--fg-3); }
.bar-pct { font-size: 12px; text-align: right; color: var(--fg-1); }

.mini-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.mini-stat { display: flex; flex-direction: column; gap: 2px; }
.ms-label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; }
.ms-value { font-size: 14px; color: var(--fg-1); font-weight: 600; }

.related-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 12px 16px; }
.related { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: left; display: flex; flex-direction: column; gap: 4px; color: inherit; }
.related:hover { border-color: var(--border-strong); }
.related-head { display: flex; justify-content: space-between; align-items: baseline; }
.related .sym { font-weight: 700; color: var(--fg-0); font-size: 12px; }
.related .sub-name { font-size: 10px; color: var(--fg-3); }

.feed-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 2px; }
.feed-title { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; color: var(--fg-0); }
.feed-title .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bear); animation: pulse-r 1.4s infinite; }
@keyframes pulse-r { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.feed-filters { display: flex; gap: 4px; }
.filter { background: var(--panel-1); border: 1px solid var(--border); color: var(--fg-2); padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }
.filter:hover { color: var(--fg-0); }
.filter.on { background: var(--accent); color: var(--bg-0); border-color: var(--accent); }

.feed-grid { display: grid; grid-template-columns: 1fr 340px; gap: 14px; }
.feed-col { display: flex; flex-direction: column; gap: 10px; }
.post { background: var(--panel-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; gap: 14px; }
.post-rail { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 52px; flex-shrink: 0; }
.post-score { font-size: 13px; font-weight: 700; }
.post-gauge { width: 6px; height: 80px; background: var(--panel-2); border-radius: 3px; position: relative; overflow: hidden; }
.post-gauge-fill { position: absolute; bottom: 0; left: 0; right: 0; transition: height 0.3s; }
.post-body { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.post-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; flex-wrap: wrap; }
.sym-link { background: transparent; border: none; color: var(--accent); font-weight: 600; padding: 0; font-size: 12px; cursor: pointer; }
.sym-link:hover { text-decoration: underline; }
.thread-link { color: var(--fg-0); font-weight: 500; font-size: 13px; text-decoration: none; }
.thread-link:hover { color: var(--accent); text-decoration: underline; }
.post-stats { display: flex; align-items: center; gap: 4px; color: var(--fg-2); }
.post-tokens { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
.tok { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--panel-2); color: var(--fg-2); border: 1px solid var(--border); }
.tok-up { background: color-mix(in oklch, var(--bull), transparent 82%); color: var(--bull); border-color: color-mix(in oklch, var(--bull), transparent 70%); }
.tok-dn { background: color-mix(in oklch, var(--bear), transparent 82%); color: var(--bear); border-color: color-mix(in oklch, var(--bear), transparent 70%); }

.feed-side { display: flex; flex-direction: column; gap: 10px; }
.right-now { padding: 4px 0; }
.rn { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.rn:last-child { border-bottom: none; }
.rn-label { font-size: 12px; color: var(--fg-2); }
.rn-value { font-size: 14px; font-weight: 600; color: var(--fg-0); }
.rn-delta { min-width: 44px; text-align: right; }

.tweaks { position: fixed; bottom: 20px; right: 20px; width: 280px; z-index: 100; background: var(--panel-1); border: 1px solid var(--border-strong); border-radius: 12px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6); overflow: hidden; }
.tweaks-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--panel-2); }
.tweaks-title { font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-1); }
.tweaks-close { background: transparent; border: none; color: var(--fg-3); font-size: 16px; padding: 0 4px; cursor: pointer; }
.tweaks-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.tw-group { display: flex; flex-direction: column; gap: 6px; }
.tw-label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
.tw-btns { display: flex; gap: 4px; }
.tw-btn { flex: 1; background: var(--panel-2); border: 1px solid var(--border); color: var(--fg-2); padding: 6px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.tw-btn.on { background: var(--accent); color: var(--bg-0); border-color: var(--accent); }
.tw-colors { display: flex; gap: 6px; }
.tw-color { flex: 1; height: 28px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; }
.tw-color.on { border-color: var(--fg-0); }

.empty-state { padding: 40px 20px; text-align: center; color: var(--fg-3); font-size: 13px; }
.error-state { padding: 20px; text-align: center; color: var(--bear); font-size: 13px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
.error-state button { background: var(--panel-2); border: 1px solid var(--border); color: var(--fg-1); padding: 6px 14px; border-radius: 6px; font-size: 12px; }
.loading-bar { height: 2px; background: color-mix(in oklch, var(--accent), transparent 80%); overflow: hidden; position: relative; }
.loading-bar::after { content: ""; position: absolute; inset: 0; background: var(--accent); animation: loading 1.2s ease-in-out infinite; }
@keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
</style>
</head>
<body>

<script>

  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// -------------------------------------------------------------------
// Config + helpers
// -------------------------------------------------------------------
const CFG = window.DASHBOARD_CONFIG;
const API = CFG.apiBase; // e.g. "/api/epic"

const ACCENT_COLORS = {
  blue:   { var: "oklch(72% 0.18 250)", soft: "oklch(32% 0.08 250)" },
  violet: { var: "oklch(72% 0.18 300)", soft: "oklch(32% 0.08 300)" },
  teal:   { var: "oklch(72% 0.14 190)", soft: "oklch(32% 0.06 190)" },
  amber:  { var: "oklch(78% 0.15 80)",  soft: "oklch(32% 0.06 80)" },
};

// Frontend range → backend lookback.
// 1H → "1d" with client-side slice to last 60m.
// Backend only goes down to hourly buckets, so sub-hour we just show the freshest bucket(s).
const RANGE_TO_LOOKBACK = { "1H": "1d", "1D": "1d", "1W": "7d", "1M": "1mo", "ALL": "1y" };

const fmtPct = (n) => (n == null || !isFinite(n)) ? "—" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
const fmtPrice = (n) => (n == null || !isFinite(n)) ? "—" : n.toFixed(2);
const fmtBig = (n) => {
  if (n == null) return "0";
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + "M";
  if (n >= 1000) return (n/1000).toFixed(1) + "k";
  return Math.round(n).toString();
};
const relTime = (isoStr) => {
  if (!isoStr) return "—";
  const then = new Date(isoStr).getTime();
  const sec = Math.max(0, (Date.now() - then) / 1000);
  if (sec < 60) return Math.round(sec) + "s ago";
  if (sec < 3600) return Math.round(sec / 60) + "m ago";
  if (sec < 86400) return Math.round(sec / 3600) + "h ago";
  return Math.round(sec / 86400) + "d ago";
};

// Convert backend pos/neg counts → 0–100 "bullish %" price.
function priceFromCounts(pos, neg) {
  const total = (pos || 0) + (neg || 0);
  if (total === 0) return 50;
  const score = 50 + 50 * ((pos - neg) / total);
  return Math.max(0, Math.min(100, score));
}

// Classify a subreddit's sector from its name — cosmetic, grouping in sector map.
function sectorFor(sub) {
  const s = (sub || "").toLowerCase();
  if (/(stock|wallstreet|invest|finance|bitcoin|crypto|econ)/.test(s)) return "Finance";
  if (/(game|gaming|deal|epic|steam|pc|patientgamers|rumour|rumor)/.test(s)) return "Gaming";
  if (/(tech|apple|linux|android|ios|program|future)/.test(s)) return "Tech";
  if (/(news|world|politic|science)/.test(s)) return "News";
  if (/(music|movie|book|sport|art|food)/.test(s)) return "Culture";
  return "Other";
}

async function fetchJson(url, opts = {}) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${url}`);
  return r.json();
}

// -------------------------------------------------------------------
// Hooks — polling + state
// -------------------------------------------------------------------
function useInterval(fn, ms, deps) {
  const ref = useRef(fn);
  useEffect(() => { ref.current = fn; });
  useEffect(() => {
    if (ms == null) return;
    const id = setInterval(() => ref.current(), ms);
    return () => clearInterval(id);
  }, deps);
}

function useApi(url, refreshMs) {
  const [state, setState] = useState({ data: null, error: null, loading: true });
  const [nonce, setNonce] = useState(0);
  const refresh = useCallback(() => setNonce(n => n + 1), []);
  useEffect(() => {
    if (!url) return;
    let cancelled = false;
    setState(s => ({ ...s, loading: true }));
    fetchJson(url)
      .then(data => { if (!cancelled) setState({ data, error: null, loading: false }); })
      .catch(err => { if (!cancelled) setState({ data: null, error: err.message, loading: false }); });
    return () => { cancelled = true; };
  }, [url, nonce]);
  useInterval(() => { if (url) refresh(); }, refreshMs, [url, refreshMs]);
  return { ...state, refresh };
}

// -------------------------------------------------------------------
// Derive our frontend shape from real API responses
// -------------------------------------------------------------------
// Chart smoothing: each plotted value is a rolling pos/neg aggregate over a
// trailing window of `SMOOTH_WINDOW_BY_RANGE[range]` buckets. Without this,
// a bucket with a single positive signal spikes to 100 and a single negative
// signal drops to 0, which makes the chart look dramatically volatile even
// on days with one mention. Rolling the counts (not the already-rescaled
// prices) is more honest than averaging prices because it naturally weights
// by volume — a 20-mention day dominates a 1-mention day inside the window.
const SMOOTH_WINDOW_BY_RANGE = {
  "1H": 3,   // trailing 3 hourly buckets ≈ 3h smoothing
  "1D": 3,
  "1W": 3,   // trailing 3 daily buckets
  "1M": 5,   // trailing 5 daily buckets
  "3M": 7,
  "ALL": 14, // trailing 2-week rolling
};

function buildSeries(history, range) {
  const rows = history?.data ?? [];
  const window = SMOOTH_WINDOW_BY_RANGE[range] || 3;
  let mapped = rows.map((r, i) => {
    let posSum = 0, negSum = 0;
    const start = Math.max(0, i - window + 1);
    for (let j = start; j <= i; j++) {
      posSum += rows[j].positive || 0;
      negSum += rows[j].negative || 0;
    }
    return {
      t: r.timestamp,
      v: priceFromCounts(posSum, negSum),              // smoothed 0–100 bullish score
      vRaw: priceFromCounts(r.positive, r.negative),   // per-bucket, kept for debug
      mentions: r.mention_count,
      weighted_score: r.weighted_score,
      pos: r.positive,
      neg: r.negative,
    };
  });
  if (range === "1H") {
    // Client-side slice: last hour of points. Backend buckets hourly for 1d/7d.
    const cutoff = Date.now() - 60 * 60 * 1000;
    const recent = mapped.filter(r => new Date(r.t).getTime() >= cutoff);
    if (recent.length >= 2) mapped = recent;
    else mapped = mapped.slice(-2); // fall back to last 2 points so we can still draw a line
  }
  return mapped.map((p, i) => ({ ...p, i }));
}

function buildPerSub(communities) {
  const subs = communities || [];
  return subs.map(c => ({
    sym: c.community,
    name: "r/" + c.community,
    sector: sectorFor(c.community),
    price: priceFromCounts(c.positive_count, c.negative_count),
    positive_count: c.positive_count,
    negative_count: c.negative_count,
    mentions: c.mention_count,
    weighted_score: c.weighted_score,
    post_count: c.post_count,
    comment_count: c.comment_count,
    last_seen: c.last_seen,
    // synthetic ~flat sparkline series from raw ratio — no per-sub history endpoint yet
    series: Array.from({length: 12}, (_, i) => ({ i, v: priceFromCounts(c.positive_count, c.negative_count), mentions: c.mention_count / 12 })),
  }));
}

// -------------------------------------------------------------------
// Chart components
// -------------------------------------------------------------------
function toCandles(series, buckets = 24) {
  if (!series.length) return [];
  const size = Math.max(1, Math.floor(series.length / buckets));
  const out = [];
  for (let i = 0; i < series.length; i += size) {
    const slice = series.slice(i, i + size);
    if (!slice.length) continue;
    out.push({ open: slice[0].v, close: slice[slice.length - 1].v, high: Math.max(...slice.map(s => s.v)), low: Math.min(...slice.map(s => s.v)), i: out.length });
  }
  return out;
}

// Chart component. Wraps TradingView's lightweight-charts — same library the
// v1 dashboard uses, so both dashboards render with the same fidelity. We use
// a baseline series at 50 (neutral) so above-50 fills bullish green and
// below-50 fills bearish red, preserving v2's 0-100 "stock exchange" framing
// while handing the hard parts (time axis, Y-axis labels, crosshair tooltip,
// responsive sizing) to the library.
function Chart({ series, height = 320, onHover, hoverIndex }) {
  const containerRef = useRef(null);
  const chartRef = useRef(null);
  const seriesRef = useRef(null);
  const onHoverRef = useRef(onHover);
  onHoverRef.current = onHover;

  // Create chart on mount, destroy on unmount.
  useEffect(() => {
    if (!containerRef.current || !window.LightweightCharts) return;
    const chart = LightweightCharts.createChart(containerRef.current, {
      autoSize: true,
      layout: {
        background: { color: "transparent" },
        textColor: "#8c97ae",
        fontFamily: '"JetBrains Mono", monospace',
      },
      grid: {
        vertLines: { color: "rgba(140, 151, 174, 0.08)" },
        horzLines: { color: "rgba(140, 151, 174, 0.08)" },
      },
      rightPriceScale: {
        borderColor: "rgba(140, 151, 174, 0.18)",
        scaleMargins: { top: 0.08, bottom: 0.08 },
      },
      timeScale: {
        borderColor: "rgba(140, 151, 174, 0.18)",
        timeVisible: true,
        secondsVisible: false,
        fixLeftEdge: true,
        fixRightEdge: true,
        rightOffset: 2,
        barSpacing: 12,
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine: { color: "rgba(94, 255, 179, 0.42)", width: 1, style: 2, labelBackgroundColor: "#101522" },
        horzLine: { color: "rgba(94, 255, 179, 0.22)", width: 1, style: 2, labelBackgroundColor: "#101522" },
      },
      handleScroll: false,
      handleScale: false,
    });
    const bl = chart.addBaselineSeries({
      baseValue: { type: "price", price: 50 },
      topLineColor: "#5effb3",     // bullish line
      topFillColor1: "rgba(94, 255, 179, 0.35)",
      topFillColor2: "rgba(94, 255, 179, 0.02)",
      bottomLineColor: "#ff5b7a",  // bearish line
      bottomFillColor1: "rgba(255, 91, 122, 0.30)",
      bottomFillColor2: "rgba(255, 91, 122, 0.02)",
      lineWidth: 2,
      priceLineVisible: false,
      lastValueVisible: true,
      crosshairMarkerVisible: true,
      priceFormat: { type: "price", precision: 2, minMove: 0.01 },
    });
    chartRef.current = chart;
    seriesRef.current = bl;

    // Coordinate hover with React state so the hero number above the chart
    // updates as the crosshair moves.
    chart.subscribeCrosshairMove((param) => {
      if (!param || !param.time || !param.seriesData || !param.seriesData.get(bl)) {
        onHoverRef.current?.(null);
        return;
      }
      const point = param.seriesData.get(bl);
      onHoverRef.current?.(null, { time: param.time, value: point.value });
    });

    return () => {
      chart.remove();
      chartRef.current = null;
      seriesRef.current = null;
    };
  }, []);

  // Feed data whenever series changes.
  useEffect(() => {
    if (!seriesRef.current || !series || series.length === 0) return;
    // Deduplicate by timestamp, sort ascending, map to { time: unix_seconds, value }.
    const seen = new Set();
    const points = [];
    for (const p of series) {
      const tSec = Math.floor(new Date(p.t).getTime() / 1000);
      if (seen.has(tSec)) continue;
      seen.add(tSec);
      points.push({ time: tSec, value: Number(p.v) || 0 });
    }
    points.sort((a, b) => a.time - b.time);
    seriesRef.current.setData(points);
    chartRef.current?.timeScale().fitContent();
  }, [series]);

  if (!series || series.length < 2) {
    return <div className="empty-state" style={{ height }}>{series && series.length === 1 ? "Only one data point in this window — need two or more to draw a line." : "No data in this window."}</div>;
  }

  return (
    <div className="chart-wrap">
      <div ref={containerRef} style={{ width: "100%", height: `${height}px` }} role="figure" aria-label="Sentiment timeline chart"/>
    </div>
  );
}

function Sparkline({ series, width = 140, height = 36 }) {
  if (!series?.length) return null;
  const min = Math.min(...series.map((p) => p.v)), max = Math.max(...series.map((p) => p.v));
  const range = Math.max(1, max - min);
  const xFor = (i) => (i / (series.length - 1)) * width;
  const yFor = (v) => height - ((v - min) / range) * (height - 4) - 2;
  const d = series.map((p, i) => `${i === 0 ? "M" : "L"} ${xFor(i).toFixed(2)} ${yFor(p.v).toFixed(2)}`).join(" ");
  const area = d + ` L ${xFor(series.length - 1)} ${height} L 0 ${height} Z`;
  const up = series[series.length - 1].v >= series[0].v;
  const color = up ? "var(--bull)" : "var(--bear)";
  const id = `spark-${Math.round(Math.random() * 1e9)}`;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width={width} height={height} preserveAspectRatio="none" className="sparkline">
      <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.35"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.6"/>
    </svg>
  );
}

// -------------------------------------------------------------------
// Layout primitives
// -------------------------------------------------------------------
function Card({ title, accent = "accent", children, tight, right }) {
  return (
    <div className={`card ${tight ? "card-tight" : ""}`}>
      <div className="card-head">
        <div className="card-title"><span className={`dot dot-${accent}`}/>{title}</div>
        {right}
      </div>
      <div className="card-body">{children}</div>
    </div>
  );
}

function Kpi({ label, value, sub, up, big }) {
  return (
    <div className={`kpi ${big ? "kpi-big" : ""}`}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      <div className={`kpi-sub ${up == null ? "" : up ? "up" : "dn"}`}>{sub}</div>
    </div>
  );
}

function Clock() {
  const [t, setT] = useState(() => new Date());
  useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
  return <div className="clock"><span className="live-dot"/><span>LIVE · {t.toTimeString().slice(0,8)}</span></div>;
}

// -------------------------------------------------------------------
// Trending tape (from /api/radar)
// -------------------------------------------------------------------
function TrendingTape() {
  const { data, error } = useApi("/api/radar?window=4h", 60_000);
  const items = useMemo(() => {
    if (!data) return [];
    const list = data.tickers || data.radar || data;
    if (!Array.isArray(list)) return [];
    return list.slice(0, 20).map(t => ({
      keyword: t.ticker_symbol || t.ticker || t.symbol,
      velocity: t.velocity_ratio ?? t.radar_score ?? null,
      mentions: t.recent_count ?? t.mention_count ?? 0,
    })).filter(t => t.keyword);
  }, [data]);
  if (error) return <div className="ticker-tape"><div className="tape-empty">Radar unavailable: {error}</div></div>;
  if (!items.length) return <div className="ticker-tape"><div className="tape-empty">Warming up — no velocity spikes yet.</div></div>;
  return (
    <div className="ticker-tape">
      <div className="ticker-track">
        {[...items, ...items].map((d, i) => (
          <span key={i} className="tape-item">
            <span className="tape-kw">{d.keyword}</span>
            <span className="tape-price">{d.mentions} mentions</span>
            {d.velocity != null && <span className={`tape-chg ${d.velocity >= 1 ? "up" : "dn"}`}>{(d.velocity >= 1 ? "+" : "")}{Math.round((d.velocity - 1) * 100)}%</span>}
          </span>
        ))}
      </div>
    </div>
  );
}

// -------------------------------------------------------------------
// Overview screen
// -------------------------------------------------------------------
function Overview({ range, onRangeChange, chartType, density, onPickSub }) {
  const lookback = RANGE_TO_LOOKBACK[range] || "7d";
  const overview = useApi(`${API}/overview?lookback=${lookback}`, 60_000);
  const history  = useApi(`${API}/sentiment-history?lookback=${lookback}`, 60_000);
  const comms    = useApi(`${API}/communities?lookback=${lookback}`, 60_000);

  const series = useMemo(() => buildSeries(history.data, range), [history.data, range]);
  const perSub = useMemo(() => buildPerSub(comms.data), [comms.data]);
  // hoverVal is the 0-100 bullish value from the chart's crosshair. When the
  // user isn't hovering, the hero falls back to aggPrice (the full-window
  // aggregate) so the big number matches the Aggregate Sentiment KPI.
  const [hoverVal, setHoverVal] = useState(null);
  const handleChartHover = useCallback((_idx, info) => {
    setHoverVal(info ? info.value : null);
  }, []);

  const aggPrice = useMemo(() => {
    if (!overview.data) return 50;
    return priceFromCounts(overview.data.positive_count, overview.data.negative_count);
  }, [overview.data]);
  const aggDelta = useMemo(() => {
    if (series.length < 2) return 0;
    return series[series.length - 1].v - series[0].v;
  }, [series]);

  const sortedByBull = useMemo(() => [...perSub].sort((a, b) => b.price - a.price), [perSub]);
  const mostBullish = sortedByBull.slice(0, 5);
  const mostBearish = sortedByBull.slice(-5).reverse();
  const mostActive  = useMemo(() => [...perSub].sort((a, b) => b.mentions - a.mentions).slice(0, 5), [perSub]);
  const bullCount = perSub.filter(s => s.price > 55).length;
  const bearCount = perSub.filter(s => s.price < 45).length;
  const neuCount  = perSub.length - bullCount - bearCount;

  const anyLoading = overview.loading || history.loading || comms.loading;
  const anyError   = overview.error || history.error || comms.error;

  return (
    <div className={`overview density-${density}`}>
      {anyLoading && !overview.data && <div className="loading-bar"/>}
      {anyError && <div className="error-state">Couldn't reach the API: {anyError} <button onClick={() => { overview.refresh(); history.refresh(); comms.refresh(); }}>Retry</button></div>}

      <section className="kpi-row">
        <Kpi label={`Aggregate sentiment · ${CFG.displayName}`} value={fmtPrice(aggPrice)} sub={fmtPct(aggDelta)} up={aggDelta >= 0} big/>
        <Kpi label="Bullish subs" value={`${bullCount}/${perSub.length || 0}`} sub={perSub.length ? `${Math.round(bullCount/perSub.length*100)}% of scanned` : "—"} up/>
        <Kpi label="Bearish subs" value={`${bearCount}/${perSub.length || 0}`} sub={`${neuCount} neutral`}/>
        <Kpi label="Mentions" value={fmtBig(overview.data?.mention_count ?? 0)} sub={`across ${perSub.length} subs`}/>
        <Kpi label="Weighted score" value={fmtPrice(overview.data?.weighted_score ?? 0)} sub="backend composite"/>
      </section>

      <div className="chart-card">
        <div className="chart-card-head">
          <div className="cch-left">
            <div className="cch-label">{CFG.summaryCopy}</div>
            <div className="cch-value mono">
              {fmtPrice(hoverVal != null ? hoverVal : aggPrice)}
              <span className={`cch-chg ${(hoverVal != null ? hoverVal : aggPrice) >= 50 ? "up" : "dn"}`}>{(hoverVal != null ? hoverVal : aggPrice) >= 50 ? "Bullish" : "Bearish"}</span>
            </div>
          </div>
          <div className="range-picker">
            {["1H","1D","1W","1M","ALL"].map(r => <button key={r} className={r === range ? "range on" : "range"} onClick={() => onRangeChange(r)}>{r}</button>)}
          </div>
        </div>
        <Chart series={series} height={320} onHover={handleChartHover}/>
      </div>

      <section className="grid-2">
        <Card title={`Most bullish on ${CFG.shortName}`} accent="bull">
          {mostBullish.length ? <MoversList rows={mostBullish} onPick={onPickSub}/> : <div className="empty-state">{CFG.emptyCommunities}</div>}
        </Card>
        <Card title={`Most bearish on ${CFG.shortName}`} accent="bear">
          {mostBearish.length ? <MoversList rows={mostBearish} onPick={onPickSub}/> : <div className="empty-state">{CFG.emptyCommunities}</div>}
        </Card>
      </section>

      <section className="grid-2">
        <Card title={`Most active · where ${CFG.shortName} is being discussed`} accent="accent">
          {mostActive.length ? (
            <table className="data-table">
              <thead><tr><th>Subreddit</th><th style={{textAlign:"right"}}>Sentiment</th><th style={{textAlign:"right"}}>Mentions</th><th style={{textAlign:"right"}}>Posts/Comm</th></tr></thead>
              <tbody>{mostActive.map(r => (
                <tr key={r.sym} onClick={() => onPickSub(r.sym)}>
                  <td><span className="sym">{r.sym}</span><span className="sub-name">{r.name}</span></td>
                  <td className={`mono right ${r.price >= 50 ? "up" : "dn"}`}>{fmtPrice(r.price)}</td>
                  <td className="mono right">{fmtBig(r.mentions)}</td>
                  <td className="mono right muted">{r.post_count}/{r.comment_count}</td>
                </tr>
              ))}</tbody>
            </table>
          ) : <div className="empty-state">{CFG.emptyCommunities}</div>}
        </Card>
        <Card title="Sector view" accent="accent">
          {perSub.length ? <SectorMap perSub={perSub} onPick={onPickSub}/> : <div className="empty-state">{CFG.emptyCommunities}</div>}
        </Card>
      </section>

      <section>
        <Card title={`All subreddits · sentiment on ${CFG.shortName}`} accent="accent" tight>
          {sortedByBull.length ? (
            <table className="data-table">
              <thead>
                <tr>
                  <th style={{width: 56}}>#</th>
                  <th>Subreddit</th>
                  <th>Sector</th>
                  <th style={{textAlign:'right'}}>Sentiment</th>
                  <th style={{textAlign:'right'}}>Pos/Neg</th>
                  <th style={{textAlign:'right'}}>Mentions</th>
                  <th style={{textAlign:'right'}}>Posts/Comm</th>
                  <th style={{textAlign:'right'}}>Last seen</th>
                </tr>
              </thead>
              <tbody>{sortedByBull.map((r, i) => (
                <tr key={r.sym} onClick={() => onPickSub(r.sym)}>
                  <td className="muted mono">{String(i+1).padStart(2,'0')}</td>
                  <td><span className="sym">{r.sym}</span><span className="sub-name">{r.name}</span></td>
                  <td><span className="chip">{r.sector}</span></td>
                  <td className={`mono right ${r.price >= 50 ? "up" : "dn"}`}>{fmtPrice(r.price)}</td>
                  <td className="mono right"><span className="up">{r.positive_count}</span> / <span className="dn">{r.negative_count}</span></td>
                  <td className="mono right">{fmtBig(r.mentions)}</td>
                  <td className="mono right muted">{r.post_count}/{r.comment_count}</td>
                  <td className="mono right muted">{relTime(r.last_seen)}</td>
                </tr>
              ))}</tbody>
            </table>
          ) : <div className="empty-state">{CFG.emptyCommunities}</div>}
        </Card>
      </section>
    </div>
  );
}

function MoversList({ rows, onPick }) {
  return (
    <div className="movers">
      {rows.map(r => (
        <button key={r.sym} className="mover" onClick={() => onPick(r.sym)}>
          <div className="mover-left">
            <div className="sym">{r.sym}</div>
            <div className="sub-name">{r.name}</div>
          </div>
          <div className="mono tiny muted"><span className="up">{r.positive_count}</span> / <span className="dn">{r.negative_count}</span></div>
          <div className="mover-right">
            <div className={`mono ${r.price >= 50 ? "up" : "dn"}`}>{fmtPrice(r.price)}</div>
            <div className="mono tiny muted">{fmtBig(r.mentions)} mentions</div>
          </div>
        </button>
      ))}
    </div>
  );
}

function SectorMap({ perSub, onPick }) {
  const total = perSub.reduce((s, d) => s + d.mentions, 0) || 1;
  const sectors = {};
  perSub.forEach(s => { (sectors[s.sector] ??= []).push(s); });
  return (
    <div className="sector-map">
      {Object.entries(sectors).map(([name, subs]) => (
        <div key={name} className="sector-group">
          <div className="sector-name">{name}</div>
          <div className="sector-tiles">
            {subs.map(s => {
              const pct = (s.mentions / total) * 100;
              const delta = s.price - 50;
              const intensity = Math.min(1, Math.abs(delta) / 30);
              const bg = delta >= 0
                ? `color-mix(in oklch, var(--bull), var(--panel-2) ${Math.round((1-intensity)*85)}%)`
                : `color-mix(in oklch, var(--bear), var(--panel-2) ${Math.round((1-intensity)*85)}%)`;
              return (
                <button key={s.sym} className="heat-tile" onClick={() => onPick(s.sym)} style={{ flexBasis: `${Math.max(18, pct*2.4)}%`, background: bg }}>
                  <div className="heat-sym">{s.sym}</div>
                  <div className={`heat-chg mono ${delta >= 0 ? "up" : "dn"}`}>{fmtPrice(s.price)}</div>
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// -------------------------------------------------------------------
// Detail screen: one subreddit's sentiment on this storefront
// -------------------------------------------------------------------
function Detail({ subSym, range, onRangeChange, chartType, density, onBack, onPickSub }) {
  const lookback = RANGE_TO_LOOKBACK[range] || "7d";
  const comms = useApi(`${API}/communities?lookback=${lookback}`, 60_000);
  const subs = useMemo(() => buildPerSub(comms.data), [comms.data]);
  const subData = subs.find(s => s.sym === subSym) || subs[0];

  if (comms.loading && !comms.data) return <div className="loading-bar"/>;
  if (!subData) return <div className="empty-state">No data for r/{subSym} in this window. <button className="btn-ghost" onClick={onBack}>← Back</button></div>;

  const last = subData.price;
  const posNeg = (subData.positive_count + subData.negative_count) || 1;

  return (
    <div className="detail">
      <div className="detail-head">
        <button className="btn-ghost" onClick={onBack}>← Back to {CFG.shortName}</button>
        <div className="detail-title">
          <div className="detail-sym-wrap">
            <span className="detail-kw-label">{CFG.shortName} in</span>
            <span className="detail-sym">{subData.sym}</span>
            <span className="detail-name">{subData.name}</span>
          </div>
          <div className="detail-meta">
            <span className="chip">{subData.sector}</span>
            <span className="sep">·</span>
            <span className="muted">{fmtBig(subData.mentions)} mentions in {range}</span>
            <span className="sep">·</span>
            <span className="muted">last seen {relTime(subData.last_seen)}</span>
          </div>
        </div>
      </div>

      <div className="detail-pricebar">
        <div className="price-main">
          <span className="price-num mono">{fmtPrice(last)}</span>
          <span className={`price-chg mono ${last >= 50 ? "up" : "dn"}`}>{last >= 50 ? "▲" : "▼"} {last >= 50 ? "Bullish" : "Bearish"}</span>
        </div>
        <div className="price-stats">
          <Stat label="Positive"  value={String(subData.positive_count)}/>
          <Stat label="Negative"  value={String(subData.negative_count)}/>
          <Stat label="Weighted"  value={fmtPrice(subData.weighted_score)}/>
          <Stat label="Posts/Comm" value={`${subData.post_count}/${subData.comment_count}`}/>
        </div>
        <div className="range-picker">
          {["1H","1D","1W","1M","ALL"].map(r => <button key={r} className={r === range ? "range on" : "range"} onClick={() => onRangeChange(r)}>{r}</button>)}
        </div>
      </div>

      <div className="grid-2">
        <Card title={`Sentiment breakdown in r/${subData.sym}`} accent="accent">
          <Breakdown pos={subData.positive_count} neg={subData.negative_count} weighted={subData.weighted_score}/>
        </Card>
        <Card title={`Other subs talking about ${CFG.shortName}`} accent="accent" tight>
          <div className="related-row">
            {subs.filter(s => s.sym !== subData.sym).slice(0, 6).map(s => (
              <button key={s.sym} className="related" onClick={() => onPickSub(s.sym)}>
                <div className="related-head">
                  <span className="sym">{s.sym}</span>
                  <span className={`mono tiny ${s.price >= 50 ? "up" : "dn"}`}>{fmtPrice(s.price)}</span>
                </div>
                <div className="mono tiny muted">{fmtBig(s.mentions)} · {s.positive_count}+ / {s.negative_count}-</div>
                <div className="sub-name">{s.name}</div>
              </button>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

function Stat({ label, value }) {
  return <div className="stat"><div className="stat-label">{label}</div><div className="stat-value mono">{value}</div></div>;
}

function Breakdown({ pos, neg, weighted }) {
  const total = (pos + neg) || 1;
  const bullPct = Math.round(pos / total * 100);
  const bearPct = 100 - bullPct;
  return (
    <div className="breakdown">
      <div className="bar-row"><div className="bar-label">Bullish</div><div className="bar-track"><div className="bar-fill up" style={{width: `${bullPct}%`}}/></div><div className="bar-pct mono">{bullPct}%</div></div>
      <div className="bar-row"><div className="bar-label">Bearish</div><div className="bar-track"><div className="bar-fill dn" style={{width: `${bearPct}%`}}/></div><div className="bar-pct mono">{bearPct}%</div></div>
      <div className="mini-stats">
        <div className="mini-stat"><div className="ms-label">Positive</div><div className="ms-value mono">{pos}</div></div>
        <div className="mini-stat"><div className="ms-label">Negative</div><div className="ms-value mono">{neg}</div></div>
        <div className="mini-stat"><div className="ms-label">Weighted</div><div className="ms-value mono">{fmtPrice(weighted)}</div></div>
        <div className="mini-stat"><div className="ms-label">Backend</div><div className="ms-value mono">sentix-v1</div></div>
      </div>
    </div>
  );
}

// -------------------------------------------------------------------
// Live feed (recent thread-grouped signals)
// -------------------------------------------------------------------
function LiveFeed({ onPickSub }) {
  const { data, error, loading, refresh } = useApi(`${API}/recent-signals`, 15_000);
  const [filter, setFilter] = useState("ALL");
  const rows = data || [];
  const filtered = useMemo(() => {
    return rows.filter(r => {
      if (filter === "ALL") return true;
      const net = (r.positive_count || 0) - (r.negative_count || 0);
      if (filter === "BULL") return net > 0;
      if (filter === "BEAR") return net < 0;
      if (filter === "POSTS") return (r.post_count || 0) > 0;
      return true;
    });
  }, [rows, filter]);

  return (
    <div className="feed">
      <div className="feed-head">
        <div className="feed-title">
          <span className="live-dot"/>
          <span>Live stream · recent threads mentioning <b>{CFG.shortName}</b></span>
          <span className="muted small">· updated every 15s</span>
        </div>
        <div className="feed-filters">
          {["ALL","BULL","BEAR","POSTS"].map(f => <button key={f} className={`filter ${filter===f ? "on" : ""}`} onClick={() => setFilter(f)}>{f}</button>)}
        </div>
      </div>

      {error && <div className="error-state">{error} <button onClick={refresh}>Retry</button></div>}
      {loading && !data && <div className="loading-bar"/>}

      <div className="feed-grid">
        <div className="feed-col">
          {!loading && filtered.length === 0 && <div className="empty-state">{CFG.emptySignals}</div>}
          {filtered.map((r, i) => <ThreadCard key={i} r={r} onPick={onPickSub}/>)}
        </div>
        <div className="feed-side">
          <Card title={`Right now · ${CFG.shortName}`} accent="accent" tight>
            <div className="right-now">
              <RNow label="Threads (window)" value={String(rows.length)}/>
              <RNow label="Subs active" value={String(new Set(rows.flatMap(r => (r.community || "").split(" | ").filter(Boolean))).size)}/>
              <RNow label="Posts" value={String(rows.reduce((s, r) => s + (r.post_count || 0), 0))}/>
              <RNow label="Comments" value={String(rows.reduce((s, r) => s + (r.comment_count || 0), 0))}/>
              <RNow label="Net sentiment" value={(() => {
                const p = rows.reduce((s, r) => s + (r.positive_count || 0), 0);
                const n = rows.reduce((s, r) => s + (r.negative_count || 0), 0);
                return fmtPrice(priceFromCounts(p, n));
              })()} up/>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

function ThreadCard({ r, onPick }) {
  const pos = r.positive_count || 0, neg = r.negative_count || 0;
  const price = priceFromCounts(pos, neg);
  const sentPct = Math.round(price);
  const up = price >= 50;
  const communities = (r.community || "").split(" | ").filter(Boolean);
  const primary = communities[0] || "unknown";
  return (
    <div className="post">
      <div className="post-rail">
        <div className={`post-score mono ${up ? "up" : "dn"}`}>{fmtPrice(r.weighted_score)}</div>
        <div className="post-gauge"><div className="post-gauge-fill" style={{height: `${sentPct}%`, background: up ? "var(--bull)" : "var(--bear)"}}/></div>
      </div>
      <div className="post-body">
        <div className="post-meta">
          {communities.map(c => <button key={c} className="sym-link" onClick={() => onPick(c)}>r/{c}</button>)}
          <span className="chip tiny">{r.post_count > 0 && r.comment_count > 0 ? "post + comments" : r.post_count > 0 ? "post" : "comments"}</span>
          <span className="sep">·</span>
          <span className="muted tiny">{relTime(r.collected_at)}</span>
        </div>
        {r.thread_url
          ? <a className="thread-link" href={r.thread_url} target="_blank" rel="noopener noreferrer">Thread in r/{primary} · open on Reddit →</a>
          : <div className="thread-link" style={{color: "var(--fg-2)"}}>Ungrouped signal in r/{primary}</div>
        }
        <div className="post-stats">
          <span className="mono tiny up">{pos}+</span>
          <span className="sep">·</span>
          <span className="mono tiny dn">{neg}-</span>
          <span className="sep">·</span>
          <span className="mono tiny">↑ {fmtBig(r.upvotes)}</span>
          <span className="sep">·</span>
          <span className="mono tiny">💬 {fmtBig(r.reply_count)}</span>
          <span className="sep">·</span>
          <span className="muted tiny">{r.signal_count} signal{r.signal_count === 1 ? "" : "s"}</span>
        </div>
        <div className="post-tokens">
          <Token label={price >= 70 ? "very bullish" : price >= 55 ? "mild bullish" : price >= 45 ? "neutral" : price >= 30 ? "mild bearish" : "very bearish"} up={up} neutral={price >= 45 && price <= 55}/>
          <Token label={`${r.post_count} posts`}/>
          <Token label={`${r.comment_count} comments`}/>
        </div>
      </div>
    </div>
  );
}

function Token({ label, up, neutral }) {
  const cls = neutral ? "" : up === undefined ? "" : up ? "tok-up" : "tok-dn";
  return <span className={`tok ${cls}`}>{label}</span>;
}

function RNow({ label, value, up }) {
  return <div className="rn"><div className="rn-label">{label}</div><div className="rn-value mono">{value}</div><div className={`rn-delta mono tiny ${up ? "up" : "muted"}`}/></div>;
}

// -------------------------------------------------------------------
// Tweaks panel
// -------------------------------------------------------------------
function Tweaks({ state, setState, onClose }) {
  const set = (k, v) => setState(s => ({ ...s, [k]: v }));
  const Btn = ({ k, v, label }) => <button className={`tw-btn ${state[k] === v ? "on" : ""}`} onClick={() => set(k, v)}>{label ?? v}</button>;
  return (
    <div className="tweaks">
      <div className="tweaks-head"><div className="tweaks-title">Tweaks</div><button className="tweaks-close" onClick={onClose}>×</button></div>
      <div className="tweaks-body">
        <div className="tw-group"><div className="tw-label">Theme</div><div className="tw-btns"><Btn k="theme" v="dark" label="Dark"/><Btn k="theme" v="light" label="Light"/><Btn k="theme" v="hi" label="Contrast"/></div></div>
        <div className="tw-group"><div className="tw-label">Chart style</div><div className="tw-btns"><Btn k="chartType" v="area" label="Area"/><Btn k="chartType" v="line" label="Line"/><Btn k="chartType" v="candle" label="Candle"/></div></div>
        <div className="tw-group"><div className="tw-label">Density</div><div className="tw-btns"><Btn k="density" v="spacious" label="Airy"/><Btn k="density" v="normal" label="Default"/><Btn k="density" v="dense" label="Dense"/></div></div>
        <div className="tw-group"><div className="tw-label">Accent</div><div className="tw-colors">
          {Object.entries(ACCENT_COLORS).map(([k, c]) => <button key={k} className={`tw-color ${state.accent === k ? "on" : ""}`} style={{ background: c.var }} onClick={() => set("accent", k)}/>)}
        </div></div>
      </div>
    </div>
  );
}

// -------------------------------------------------------------------
// App shell
// -------------------------------------------------------------------
const STORAGE_KEY = `sentix.${CFG.slug}.state`;

function App() {
  const [tweaks, setTweaks] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY + ".tweaks") || "null");
      return { ...window.TWEAK_DEFAULTS, ...(saved || {}) };
    } catch { return window.TWEAK_DEFAULTS; }
  });
  const [editMode, setEditMode] = useState(false);
  const [view, setView] = useState(() => localStorage.getItem(STORAGE_KEY + ".view") || "overview");
  const [activeSub, setActiveSub] = useState(() => localStorage.getItem(STORAGE_KEY + ".sub") || "");
  // Default range matches the v1 epic_dashboard's default ("1mo" lookback) so
  // first-load KPIs show the same numbers on both dashboards. Users who have
  // already picked a range keep their choice via the localStorage fallback.
  const [range, setRange] = useState(() => localStorage.getItem(STORAGE_KEY + ".range") || "1M");

  useEffect(() => { localStorage.setItem(STORAGE_KEY + ".tweaks", JSON.stringify(tweaks)); }, [tweaks]);
  useEffect(() => { localStorage.setItem(STORAGE_KEY + ".view", view); }, [view]);
  useEffect(() => { localStorage.setItem(STORAGE_KEY + ".sub", activeSub); }, [activeSub]);
  useEffect(() => { localStorage.setItem(STORAGE_KEY + ".range", range); }, [range]);

  useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setEditMode(true);
      if (d.type === "__deactivate_edit_mode") setEditMode(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);
  useEffect(() => { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: tweaks }, "*"); }, [tweaks]);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
    const c = ACCENT_COLORS[tweaks.accent] || ACCENT_COLORS.blue;
    document.documentElement.style.setProperty("--accent", c.var);
    document.documentElement.style.setProperty("--accent-soft", c.soft);
  }, [tweaks.theme, tweaks.accent]);

  function pickSub(sym) { setActiveSub(sym); setView("detail"); }

  return (
    <div className={`app density-${tweaks.density}`} data-screen-label={`${CFG.displayName} · ${view}`}>
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark"/>
          <div className="brand-name">SentiX <span>/ {CFG.displayName}</span></div>
        </div>
        <nav className="nav">
          <button className={view === "overview" ? "on" : ""} onClick={() => setView("overview")}>Overview</button>
          <button className={view === "detail" ? "on" : ""} onClick={() => setView("detail")} disabled={!activeSub}>Subreddit{activeSub ? ` · r/${activeSub}` : ""}</button>
          <button className={view === "feed" ? "on" : ""} onClick={() => setView("feed")}>Live feed</button>
        </nav>
        <div className="storefront-switch">
          <a className={`sf-btn ${CFG.slug === "epic" ? "on" : ""}`} href="/epic/v2">Epic</a>
          <a className={`sf-btn ${CFG.slug === "steam" ? "on" : ""}`} href="/steam/v2">Steam</a>
        </div>
        <Clock/>
      </header>

      <TrendingTape/>

      <main className="main">
        {view === "overview" && <Overview range={range} onRangeChange={setRange} chartType={tweaks.chartType} density={tweaks.density} onPickSub={pickSub}/>}
        {view === "detail" && activeSub && <Detail subSym={activeSub} range={range} onRangeChange={setRange} chartType={tweaks.chartType} density={tweaks.density} onBack={() => setView("overview")} onPickSub={pickSub}/>}
        {view === "feed" && <LiveFeed onPickSub={pickSub}/>}
      </main>

      {editMode && <Tweaks state={tweaks} setState={setTweaks} onClose={() => window.parent.postMessage({ type: "__deactivate_edit_mode" }, "*")}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
