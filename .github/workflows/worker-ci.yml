name: Worker CI

on:
  push:
    paths:
      - "worker/**"
      - "docker-compose.yml"
      - ".github/workflows/worker-ci.yml"
  pull_request:
    paths:
      - "worker/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sse
          POSTGRES_PASSWORD: sse
          POSTGRES_DB: sse
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "worker/pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: worker

      - name: Lint (ruff)
        run: ruff check src/
        working-directory: worker

      - name: Type check (mypy)
        run: mypy src/
        working-directory: worker

      - name: Security scan (bandit)
        run: bandit -r src/ -c .bandit
        working-directory: worker

      - name: Test with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://sse:sse@localhost:5432/sse
          REDIS_URL: redis://localhost:6379/0
        run: pytest
        working-directory: worker
