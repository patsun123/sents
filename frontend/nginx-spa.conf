server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for all unmatched routes so that
    # client-side navigation (e.g. /tickers/AAPL) works after a hard refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted static assets for 1 year; "immutable" tells the
    # browser it never needs to revalidate within the Cache-Control window
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
