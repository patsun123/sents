# Sentiment Stock Exchange — Nginx Reverse Proxy Configuration
#
# SETUP: Replace every occurrence of ${DOMAIN} with your actual domain name
#        before deploying (e.g., sed -i 's/${DOMAIN}/sse.example.com/g' nginx.conf).
#
# TLS certificates are managed by Certbot and stored in /etc/letsencrypt.
# For initial certificate issuance see the deployment runbook.
#
# Key responsibilities:
#   - HTTP (80)  → HTTPS redirect + ACME challenge passthrough
#   - HTTPS (443) → TLS termination, security headers, gzip
#   - /api/      → proxy to FastAPI (api:8000)
#   - /api/v1/tickers/stream and /api/v1/tickers/*/stream → SSE-optimised proxy
#   - /          → proxy to frontend (frontend:80)
#   - Rate limiting on /api/ routes

# ---------------------------------------------------------------------------
# Worker configuration
# ---------------------------------------------------------------------------
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Basic settings ───────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;  # hide nginx version

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log main_json;
    error_log  /var/log/nginx/error.log  warn;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────
    # 10 requests/second per client IP; burst of 20 queued before 429.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # ── Upstream declarations ─────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:80;
        keepalive 16;
    }

    # ── Common proxy headers macro ────────────────────────────────────────
    # Included in location blocks that proxy to upstream services.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================================
    # HTTP — port 80
    # Serves only the ACME HTTP-01 challenge for Let's Encrypt renewal.
    # All other requests are permanently redirected to HTTPS.
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name ${DOMAIN};

        # Let's Encrypt HTTP-01 challenge (certbot webroot method)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS — port 443
    # TLS termination, security headers, API proxy, SSE streams, frontend.
    # =========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ${DOMAIN};

        # ── TLS configuration ─────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

        # Modern TLS: 1.2 and 1.3 only; disable older protocols
        ssl_protocols TLSv1.2 TLSv1.3;

        # Modern cipher suite (prefer forward-secrecy and AEAD)
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;  # let clients pick from the list

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling — reduces TLS handshake latency for clients
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ──────────────────────────────────────────────
        # HSTS: force HTTPS for 1 year; include subdomains; allow preloading
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                    always;
        add_header X-Content-Type-Options     "nosniff"                 always;
        add_header X-XSS-Protection           "1; mode=block"           always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;

        # ── Client request limits ─────────────────────────────────────────
        client_max_body_size 1m;

        # =================================================================
        # Location: SSE streaming endpoints
        # Must be declared BEFORE the generic /api/ block so they match first.
        # SSE requires: no proxy buffering, no caching, long read timeout,
        # explicit Connection: keep-alive, and chunked encoding.
        # =================================================================

        # Global ticker stream: GET /api/v1/tickers/stream
        location = /api/v1/tickers/stream {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend/api/v1/tickers/stream;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE-specific: disable all buffering
            proxy_buffering            off;
            proxy_cache                off;
            proxy_set_header           Connection  "keep-alive";
            proxy_set_header           X-Accel-Buffering no;
            chunked_transfer_encoding  on;

            # Keep the connection open for up to 24 h (long-running SSE)
            proxy_read_timeout         86400s;
            proxy_send_timeout         86400s;
        }

        # Per-ticker stream: GET /api/v1/tickers/{ticker}/stream
        location ~ ^/api/v1/tickers/([^/]+)/stream$ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE-specific: disable all buffering
            proxy_buffering            off;
            proxy_cache                off;
            proxy_set_header           Connection  "keep-alive";
            proxy_set_header           X-Accel-Buffering no;
            chunked_transfer_encoding  on;

            proxy_read_timeout         86400s;
            proxy_send_timeout         86400s;
        }

        # =================================================================
        # Location: REST API (non-streaming)
        # Rate limited; standard proxy with response buffering enabled.
        # =================================================================
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";  # keep-alive to upstream

            proxy_connect_timeout  10s;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
        }

        # =================================================================
        # Location: Frontend (React SPA)
        # Proxy to the frontend container's nginx.  All unmatched paths
        # fall back to index.html to support client-side routing.
        # =================================================================
        location / {
            proxy_pass         http://frontend_backend/;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Cache static assets aggressively; HTML pages must revalidate
            proxy_cache_bypass  $http_pragma;
            proxy_no_cache      $http_pragma;
        }
    }
}
