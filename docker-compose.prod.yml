services:
  api:
    ports: !override []
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env for prod deploy}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy-static:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
