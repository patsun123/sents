services:
  api:
    ports: !override []
    expose:
      - "8000"

  # Expose postgres on the Tailscale interface only, so the home worker can
  # reach it over the encrypted mesh but the public internet cannot. Docker
  # binds to the specified IP, so if TAILSCALE_IP is not on the host, the
  # container will retry until it is (handles boot ordering gracefully).
  postgres:
    ports:
      - "${TAILSCALE_IP:?set TAILSCALE_IP in .env — run `tailscale ip -4` on the droplet}:5432:5432"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env for prod deploy}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy-static:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
